services:
  mongodb:
    container_name: mongo_db
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
  redis:
    container_name: redis
    image: redis
    ports:
      - '6379:6379'
    command: redis-server --save 60 1
volumes:
  mongo_data: